services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sjs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sjs
    ports:
      - '5432:5432'
    volumes:
      - sjs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sjs']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sjs-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - sjs_redisdata:/data
    command: redis-server --appendonly yes

  # Зафиксированный тег вместо :latest — меньше сюрпризов при обновлениях образа
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: sjs-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - sjs_miniodata:/data
    healthcheck:
      # Официальный liveness endpoint MinIO
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Создаёт бакет S3_BUCKET (по умолчанию sjs), совпадает с .env.example
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: sjs-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 minio minio123
        mc mb --ignore-existing local/sjs
        echo "minio-init: bucket sjs ready"
    restart: 'no'

volumes:
  sjs_pgdata:
  sjs_redisdata:
  sjs_miniodata:
